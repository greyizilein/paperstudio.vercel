name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/migrate-loveable-vercel-AvdzU
      - claude/cazar-document-generation-8Ook4
      - claude/czar-image-generation-debug-QqkMp

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Pre-cache Deno dependencies
        run: |
          deno cache supabase/functions/czar-chat/index.ts
          deno cache supabase/functions/czar-image/index.ts
        env:
          DENO_DIR: ${{ github.workspace }}/.deno-cache

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets are set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then echo "ERROR: SUPABASE_ACCESS_TOKEN is not set"; exit 1; fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then echo "ERROR: SUPABASE_PROJECT_REF is not set"; exit 1; fi
          echo "Secrets OK. Project ref: $SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy czar-chat
        run: |
          supabase functions deploy czar-chat --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          # Disable Docker so CLI falls back to system Deno with pre-cached modules
          DOCKER_HOST: ""
          DENO_DIR: ${{ github.workspace }}/.deno-cache

      - name: Deploy czar-image
        run: |
          supabase functions deploy czar-image --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DOCKER_HOST: ""
          DENO_DIR: ${{ github.workspace }}/.deno-cache
