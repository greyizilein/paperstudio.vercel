name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/migrate-loveable-vercel-AvdzU
      - claude/cazar-document-generation-8Ook4
      - claude/czar-image-generation-debug-QqkMp

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy czar-chat
        run: |
          supabase functions deploy czar-chat \
            --project-ref $SUPABASE_PROJECT_REF \
            --legacy-bundle
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy czar-image
        run: |
          supabase functions deploy czar-image \
            --project-ref $SUPABASE_PROJECT_REF \
            --legacy-bundle
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
